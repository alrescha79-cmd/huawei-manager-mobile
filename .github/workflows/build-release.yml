name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0) — leave empty to auto-read from app.config.ts'
        required: false
        default: ''
      release_type:
        description: 'Release type'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - pre-release

env:
  ADMOB_ANDROID_APP_ID: ${{ secrets.ADMOB_ANDROID_APP_ID }}
  ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
  ADMOB_INTERSTITIAL_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_UNIT_ID }}
  ADMOB_REWARDED_UNIT_ID: ${{ secrets.ADMOB_REWARDED_UNIT_ID }}
  ADMOB_NATIVE_ADVANCED_UNIT_ID: ${{ secrets.ADMOB_NATIVE_ADVANCED_UNIT_ID }}
  ADMOB_APP_OPEN_UNIT_ID: ${{ secrets.ADMOB_APP_OPEN_UNIT_ID }}

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version and tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push — extract version from the tag ref
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            # Manual trigger with version input — sanitize whitespace
            RAW_INPUT="${{ github.event.inputs.version }}"
            SANITIZED=$(echo "$RAW_INPUT" | tr -d '[:space:]')
            VERSION="${SANITIZED#v}"
          else
            # Manual trigger without version — read from app.config.ts
            VERSION=$(grep -oP "version:\s*'\K[^']+" app.config.ts)
          fi

          TAG_NAME="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Resolved: version=$VERSION, tag_name=$TAG_NAME"

          # Validate tag format (must be like v1.2.3)
          if ! echo "$TAG_NAME" | grep -qP '^v\d+\.\d+\.\d+'; then
            echo "::error::Invalid version format: '$TAG_NAME' — expected vX.Y.Z"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: [resolve-version]
    strategy:
      matrix:
        include:
          - arch: arm64-v8a
            artifact_name: apk-arm64-v8a
            apk_suffix: arm64-v8a
            version_code_offset: 2
          - arch: armeabi-v7a
            artifact_name: apk-armeabi-v7a
            apk_suffix: armeabi-v7a
            version_code_offset: 1
          - arch: universal
            artifact_name: apk-universal
            apk_suffix: universal
            version_code_offset: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set version code
        run: echo "ANDROID_VERSION_CODE=$(( ${{ github.run_number }} * 10 + ${{ matrix.version_code_offset }} ))" >> $GITHUB_ENV

      - name: Create google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > google-services.json

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Ensure debug keystore exists
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v -storetype PKCS12 \
              -keystore android/app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Generated debug.keystore"
          else
            echo "debug.keystore already exists"
          fi

      - name: Setup release keystore
        if: ${{ env.HAS_RELEASE_KEYSTORE == 'true' }}
        env:
          HAS_RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

          # Inject signingConfigs.release into build.gradle
          GRADLE_FILE="android/app/build.gradle"
          awk '
          /signingConfigs \{/ { in_signing=1 }
          in_signing && /^    \}/ {
              print "        release {"
              print "            storeFile file(\"release.keystore\")"
              print "            storePassword System.getenv(\"RELEASE_KEYSTORE_PASSWORD\") ?: \"\""
              print "            keyAlias System.getenv(\"RELEASE_KEY_ALIAS\") ?: \"\""
              print "            keyPassword System.getenv(\"RELEASE_KEY_PASSWORD\") ?: \"\""
              print "        }"
              in_signing=0
          }
          { print }
          ' "$GRADLE_FILE" > "${GRADLE_FILE}.tmp" && mv "${GRADLE_FILE}.tmp" "$GRADLE_FILE"

          # Point release buildType to signingConfigs.release
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' "$GRADLE_FILE"

      - name: Build APK
        run: |
          cd android
          if [ "${{ matrix.arch }}" = "universal" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleRelease \
              -PreactNativeArchitectures=${{ matrix.arch }} \
              --no-daemon
          fi
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             huawei-manager-${{ matrix.apk_suffix }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: huawei-manager-*.apk
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: [resolve-version, build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Generate Release Notes from PRs
        id: release_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"
          REPO="${{ github.repository }}"
          VERSION="${{ needs.resolve-version.outputs.version }}"

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%H" 2>/dev/null || echo "")
          else
            COMMITS=$(git log --pretty=format:"%H" 2>/dev/null || echo "")
          fi

          echo "## What's Changed — v${VERSION}" > release_notes.md
          echo "" >> release_notes.md

          PR_FOUND=false
          for COMMIT in $COMMITS; do
            PR_DATA=$(gh api "repos/${REPO}/commits/${COMMIT}/pulls" --jq '.[0] | {number, title, user: .user.login, html_url}' 2>/dev/null || echo "")

            if [ -n "$PR_DATA" ] && [ "$PR_DATA" != "null" ]; then
              PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
              PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
              PR_USER=$(echo "$PR_DATA" | jq -r '.user')
              PR_URL=$(echo "$PR_DATA" | jq -r '.html_url')

              if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "null" ]; then
                continue
              fi

              if ! grep -q "#${PR_NUM}" release_notes.md 2>/dev/null; then
                echo "* ${PR_TITLE} by @${PR_USER} in [#${PR_NUM}](${PR_URL})" >> release_notes.md
                PR_FOUND=true
              fi
            fi
          done

          if [ "$PR_FOUND" = false ]; then
            echo "* Various improvements and bug fixes" >> release_notes.md
          fi

          echo "" >> release_notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...v${VERSION}" >> release_notes.md
          fi

          {
            echo 'notes<<EOF'
            cat release_notes.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: apks
          merge-multiple: true

      - name: List APKs
        run: ls -la apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag_name }}
          name: Huawei Manager v${{ needs.resolve-version.outputs.version }}
          body: |
            > [!WARNING]
            >
            > 🇬🇧 **Files are available in the `Assets` section below** 👇
            > 
            > 🇮🇩 **File download berada di bagian `Assets` di bawah** 👇

            ---

            # Huawei Manager v${{ needs.resolve-version.outputs.version }}

            ## 📥 Download Cepat

            | Versi | Cocok Untuk | (MB) | Link |
            |-------|-------------|--------|------|
            | **arm64-v8a** | HP Android 64-bit / terbaru | 38 | [Download](https://github.com/alrescha79-cmd/huawei-manager-mobile/releases/download/${{ needs.resolve-version.outputs.tag_name }}/huawei-manager-arm64-v8a.apk) |
            | **armeabi-v7a** | HP Android 32-bit / lama | 33 | [Download](https://github.com/alrescha79-cmd/huawei-manager-mobile/releases/download/${{ needs.resolve-version.outputs.tag_name }}/huawei-manager-armeabi-v7a.apk) |
            | **universal** | Semua perangkat | 88 | [Download](https://github.com/alrescha79-cmd/huawei-manager-mobile/releases/download/${{ needs.resolve-version.outputs.tag_name }}/huawei-manager-universal.apk) |

            > 💡 **Tidak tahu pilih yang mana?** Coba **arm64-v8a** dulu. Jika gagal install, gunakan **universal**.

            --- 

            ## 🔧 Cara Install

            1. Download APK sesuai tabel di atas
            2. Buka **Pengaturan → Keamanan → Aktifkan "Instal dari sumber tidak dikenal"**
            3. Buka file APK yang sudah diunduh dan ikuti instruksi install

            ---

            ## 📌 Preview

            <img width="1080" height="1350" alt="release" src="https://github.com/user-attachments/assets/df4972fd-1505-444c-8d15-c9d3f08c9e5d" />

            ---

            ${{ steps.release_notes.outputs.notes }}

            ---

            Terima kasih sudah menggunakan **Huawei Manager Mobile**! 🙏
            Temukan masalah? Laporkan di [GitHub Issues](https://github.com/alrescha79-cmd/huawei-manager-mobile/issues).
          files: apks/*.apk
          draft: false
          prerelease: ${{ github.event.inputs.release_type == 'pre-release' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}