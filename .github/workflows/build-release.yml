name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''
      release_type:
        description: 'Release type'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - pre-release

env:
  ADMOB_ANDROID_APP_ID: ${{ secrets.ADMOB_ANDROID_APP_ID }}
  ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
  ADMOB_INTERSTITIAL_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_UNIT_ID }}
  ADMOB_REWARDED_UNIT_ID: ${{ secrets.ADMOB_REWARDED_UNIT_ID }}
  ADMOB_NATIVE_ADVANCED_UNIT_ID: ${{ secrets.ADMOB_NATIVE_ADVANCED_UNIT_ID }}
  ADMOB_APP_OPEN_UNIT_ID: ${{ secrets.ADMOB_APP_OPEN_UNIT_ID }}

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Get version from app.config.ts
        id: get_version
        run: |
          VERSION=$(grep -oP "version:\s*'\\K[^']+" app.config.ts)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Set version code
        run: echo "ANDROID_VERSION_CODE=$(( ${{ github.run_number }} * 10 + 2 ))" >> $GITHUB_ENV

      - name: Create google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > google-services.json

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build APK (arm64-v8a)
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Rename and Upload arm64-v8a APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             huawei-manager-arm64-v8a.apk

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-arm64-v8a
          path: huawei-manager-*.apk
          retention-days: 7

  build-armv7:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Get version from app.config.ts
        id: get_version
        run: |
          VERSION=$(grep -oP "version:\s*'\\K[^']+" app.config.ts)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Set version code
        run: echo "ANDROID_VERSION_CODE=$(( ${{ github.run_number }} * 10 + 1 ))" >> $GITHUB_ENV

      - name: Create google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > google-services.json

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build APK (armeabi-v7a)
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=armeabi-v7a \
            --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Rename and Upload armeabi-v7a APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             huawei-manager-armeabi-v7a.apk

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-armeabi-v7a
          path: huawei-manager-*.apk
          retention-days: 7

  build-universal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Get version from app.config.ts
        id: get_version
        run: |
          VERSION=$(grep -oP "version:\s*'\\K[^']+" app.config.ts)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Set version code
        run: echo "ANDROID_VERSION_CODE=$(( ${{ github.run_number }} * 10 + 3 ))" >> $GITHUB_ENV

      - name: Create google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > google-services.json

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Universal APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Rename and Upload Universal APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             huawei-manager-universal.apk

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-universal
          path: huawei-manager-*.apk
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: [build-arm64, build-armv7, build-universal]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Generate Release Notes from PRs
        id: release_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"
          REPO="${{ github.repository }}"

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%H" 2>/dev/null || echo "")
          else
            COMMITS=$(git log --pretty=format:"%H" 2>/dev/null || echo "")
          fi

          echo "## What's Changed — v${{ needs.build-arm64.outputs.version }}" > release_notes.md
          echo "" >> release_notes.md

          PR_FOUND=false
          for COMMIT in $COMMITS; do
            PR_DATA=$(gh api "repos/${REPO}/commits/${COMMIT}/pulls" --jq '.[0] | {number, title, user: .user.login, html_url}' 2>/dev/null || echo "")

            if [ -n "$PR_DATA" ] && [ "$PR_DATA" != "null" ]; then
              PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
              PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
              PR_USER=$(echo "$PR_DATA" | jq -r '.user')
              PR_URL=$(echo "$PR_DATA" | jq -r '.html_url')

              if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "null" ]; then
                continue
              fi

              if ! grep -q "#${PR_NUM}" release_notes.md 2>/dev/null; then
                echo "* ${PR_TITLE} by @${PR_USER} in [#${PR_NUM}](${PR_URL})" >> release_notes.md
                PR_FOUND=true
              fi
            fi
          done

          if [ "$PR_FOUND" = false ]; then
            echo "* Various improvements and bug fixes" >> release_notes.md
          fi

          echo "" >> release_notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...v${{ needs.build-arm64.outputs.version }}" >> release_notes.md
          fi

          {
            echo 'notes<<EOF'
            cat release_notes.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: apks
          merge-multiple: true

      - name: List APKs
        run: ls -la apks/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: Huawei Manager v${{ needs.build-arm64.outputs.version }}
          body: |
            > [!WARNING]
            >
            > 🇬🇧 **Files are available in the `Assets` section below** 👇
            > 
            > 🇮🇩 **File download berada di bagian `Assets` di bawah** 👇

            ---

            # Huawei Manager v${{ needs.build-arm64.outputs.version }}

            ## 📥 Download Cepat

            | Versi | Cocok Untuk | (MB) | Link |
            |-------|-------------|--------|------|
            | **arm64-v8a** | HP Android 64-bit / terbaru | 38 | [Download](https://github.com/alrescha79-cmd/huawei-manager-mobile/releases/download/v${{ needs.build-arm64.outputs.version }}/huawei-manager-arm64-v8a.apk) |
            | **armeabi-v7a** | HP Android 32-bit / lama | 33 | [Download](https://github.com/alrescha79-cmd/huawei-manager-mobile/releases/download/v${{ needs.build-arm64.outputs.version }}/huawei-manager-armeabi-v7a.apk) |
            | **universal** | Semua perangkat | 88 | [Download](https://github.com/alrescha79-cmd/huawei-manager-mobile/releases/download/v${{ needs.build-arm64.outputs.version }}/huawei-manager-universal.apk) |

            > 💡 **Tidak tahu pilih yang mana?** Coba **arm64-v8a** dulu. Jika gagal install, gunakan **universal**.

            --- 

            ## 🔧 Cara Install

            1. Download APK sesuai tabel di atas
            2. Buka **Pengaturan → Keamanan → Aktifkan "Instal dari sumber tidak dikenal"**
            3. Buka file APK yang sudah diunduh dan ikuti instruksi install

            ---

            ## 📌 Preview

            <img width="1080" height="1350" alt="release" src="https://github.com/user-attachments/assets/df4972fd-1505-444c-8d15-c9d3f08c9e5d" />

            ---

            ${{ steps.release_notes.outputs.notes }}

            ---

            Terima kasih sudah menggunakan **Huawei Manager Mobile**! 🙏
            Temukan masalah? Laporkan di [GitHub Issues](https://github.com/alrescha79-cmd/huawei-manager-mobile/issues).
          files: apks/*.apk
          draft: false
          prerelease: ${{ github.event.inputs.release_type == 'pre-release' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (Manual Trigger)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Huawei Manager ${{ github.event.inputs.version }}
          body: |
            > [!WARNING]
            >
            > 🇬🇧 **Files are available in the `Assets` section below** 👇
            > 
            > 🇮🇩 **File download berada di bagian `Assets` di bawah** 👇

            ---

            # Huawei Manager ${{ github.event.inputs.version }}

            ## 📥 Download Cepat

            | Versi | Cocok Untuk | (MB) | Link |
            |-------|-------------|--------|------|
            | **arm64-v8a** | HP Android 64-bit / terbaru | 38 | [Download](https://github.com/alrescha79-cmd/huawei-manager-mobile/releases/download/${{ github.event.inputs.version }}/huawei-manager-arm64-v8a.apk) |
            | **armeabi-v7a** | HP Android 32-bit / lama | 33 | [Download](https://github.com/alrescha79-cmd/huawei-manager-mobile/releases/download/${{ github.event.inputs.version }}/huawei-manager-armeabi-v7a.apk) |
            | **universal** | Semua perangkat | 88 | [Download](https://github.com/alrescha79-cmd/huawei-manager-mobile/releases/download/${{ github.event.inputs.version }}/huawei-manager-universal.apk) |

            > 💡 **Tidak tahu pilih yang mana?** Coba **arm64-v8a** dulu. Jika gagal install, gunakan **universal**.

            --- 

            ## 🔧 Cara Install

            1. Download APK sesuai tabel di atas
            2. Buka **Pengaturan → Keamanan → Aktifkan "Instal dari sumber tidak dikenal"**
            3. Buka file APK yang sudah diunduh dan ikuti instruksi install

            ---

            ## 📌 Preview

            <img width="1080" height="1350" alt="release" src="https://github.com/user-attachments/assets/df4972fd-1505-444c-8d15-c9d3f08c9e5d" />

            ---

            ${{ steps.release_notes.outputs.notes }}

            ---

            Terima kasih sudah menggunakan **Huawei Manager Mobile**! 🙏
            Temukan masalah? Laporkan di [GitHub Issues](https://github.com/alrescha79-cmd/huawei-manager-mobile/issues).
          files: apks/*.apk
          draft: false
          prerelease: ${{ github.event.inputs.release_type == 'pre-release' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}