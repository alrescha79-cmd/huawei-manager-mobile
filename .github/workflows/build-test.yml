name: Build Test APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
        type: string
      architecture:
        description: 'Architecture to build'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - all
      upload_to_release:
        description: 'Upload to Release (direct APK download link)'
        required: true
        default: false
        type: boolean

env:
  ADMOB_ANDROID_APP_ID: ${{ secrets.ADMOB_ANDROID_APP_ID }}
  ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
  ADMOB_INTERSTITIAL_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_UNIT_ID }}
  ADMOB_REWARDED_UNIT_ID: ${{ secrets.ADMOB_REWARDED_UNIT_ID }}
  ADMOB_NATIVE_ADVANCED_UNIT_ID: ${{ secrets.ADMOB_NATIVE_ADVANCED_UNIT_ID }}
  ADMOB_APP_OPEN_UNIT_ID: ${{ secrets.ADMOB_APP_OPEN_UNIT_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Get version and branch info
        id: get_info
        run: |
          VERSION=$(grep -oP "version:\s*'\K[^']+" app.config.ts)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BRANCH=${{ github.event.inputs.branch }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Build info: v$VERSION - $BRANCH ($SHORT_SHA)"

      - name: Set version code
        run: echo "ANDROID_VERSION_CODE=$(( ${{ github.run_number }} * 10 + 9 ))" >> $GITHUB_ENV

      - name: Create google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > google-services.json

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Ensure debug keystore exists
        run: |
          # expo prebuild --clean may not create debug.keystore on CI,
          # causing assembleRelease to produce an unsigned/invalid APK
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v -storetype PKCS12 \
              -keystore android/app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Generated debug.keystore"
          else
            echo "debug.keystore already exists"
          fi

      - name: Setup release keystore
        if: ${{ env.HAS_RELEASE_KEYSTORE == 'true' }}
        env:
          HAS_RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

          # Inject signingConfigs.release into build.gradle
          GRADLE_FILE="android/app/build.gradle"
          awk '
          /signingConfigs \{/ { in_signing=1 }
          in_signing && /^    \}/ {
              print "        release {"
              print "            storeFile file(\"release.keystore\")"
              print "            storePassword System.getenv(\"RELEASE_KEYSTORE_PASSWORD\") ?: \"\""
              print "            keyAlias System.getenv(\"RELEASE_KEY_ALIAS\") ?: \"\""
              print "            keyPassword System.getenv(\"RELEASE_KEY_PASSWORD\") ?: \"\""
              print "        }"
              in_signing=0
          }
          { print }
          ' "$GRADLE_FILE" > "${GRADLE_FILE}.tmp" && mv "${GRADLE_FILE}.tmp" "$GRADLE_FILE"

          # Point release buildType to signingConfigs.release
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' "$GRADLE_FILE"

      - name: Build APK (single architecture)
        if: ${{ github.event.inputs.architecture != 'all' }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=${{ github.event.inputs.architecture }} \
            --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build APK (all architectures)
        if: ${{ github.event.inputs.architecture == 'all' }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Rename APK
        id: rename_apk
        run: |
          ARCH="${{ github.event.inputs.architecture }}"
          VERSION="${{ steps.get_info.outputs.version }}"
          BRANCH="${{ steps.get_info.outputs.branch }}"
          SHORT_SHA="${{ steps.get_info.outputs.short_sha }}"
          
          if [ "$ARCH" = "all" ]; then
            FILENAME="huawei-manager-v${VERSION}-${BRANCH}-${SHORT_SHA}-universal.apk"
          else
            FILENAME="huawei-manager-v${VERSION}-${BRANCH}-${SHORT_SHA}-${ARCH}.apk"
          fi
          
          mv android/app/build/outputs/apk/release/app-release.apk "$FILENAME"
          echo "apk_filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-apk-${{ github.event.inputs.architecture }}-${{ steps.get_info.outputs.short_sha }}
          path: huawei-manager-*.apk
          retention-days: 30

      - name: Upload to Pre-release (Direct Download)
        if: ${{ github.event.inputs.upload_to_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test-${{ github.run_number }}
          name: "🧪 Test Build #${{ github.run_number }} (${{ github.event.inputs.branch }})"
          body: |
            ## 🧪 Test Build
            
            | Info | Value |
            |------|-------|
            | **Branch** | `${{ github.event.inputs.branch }}` |
            | **Architecture** | `${{ github.event.inputs.architecture }}` |
            | **Version** | `${{ steps.get_info.outputs.version }}` |
            | **Commit** | `${{ steps.get_info.outputs.short_sha }}` |
            
            > ⚠️ This is a test build, not for production use.
            > Silakan unduh jika ingin mencoba versi terbaru sebelum rilis resmi.
          prerelease: true
          files: ${{ steps.rename_apk.outputs.apk_filename }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## 🚀 Test Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.event.inputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Architecture** | \`${{ github.event.inputs.architecture }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ steps.get_info.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ steps.get_info.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event.inputs.upload_to_release }}" = "true" ]; then
            echo "### 📥 Direct Download" >> $GITHUB_STEP_SUMMARY
            echo "[**Download APK**](https://github.com/${{ github.repository }}/releases/tag/test-${{ github.run_number }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 📦 Download Instructions" >> $GITHUB_STEP_SUMMARY
            echo "APK is available in the **Artifacts** section at the bottom of this run summary." >> $GITHUB_STEP_SUMMARY
            echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
            echo "> GitHub Actions automatically compresses artifacts into a **.zip** file." >> $GITHUB_STEP_SUMMARY
            echo "> You MUST **extract/unzip** the downloaded file to get the `.apk`." >> $GITHUB_STEP_SUMMARY
            echo "> Do not just rename the `.zip` to `.apk`, or it will say *\"package appears to be invalid\"*." >> $GITHUB_STEP_SUMMARY
          fi
